<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WikiPop</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <header class="hdr">
    <div class="logo">
      <div class="logo-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="#0a0a0a" stroke-width="1.8"/>
          <path d="M8 2C8 2 5 5 5 8s3 6 3 6" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M8 2C8 2 11 5 11 8s-3 6-3 6" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2.5" y1="8" x2="13.5" y2="8" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="3" y1="5.5" x2="13" y2="5.5" stroke="#0a0a0a" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="3" y1="10.5" x2="13" y2="10.5" stroke="#0a0a0a" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">WikiPop</span>
    </div>

    <p class="q-text">Lequel a été le plus consulté <strong>ces 7 derniers jours</strong> sur Wikipédia ?</p>

    <div class="hdr-right">
      <div class="chip" aria-label="Meilleur streak">
        <span class="chip-lbl">Best</span>
        <span id="best">0</span>
      </div>
      <div class="chip chip-streak" id="streak-chip" aria-label="Streak actuel">
        <span class="streak-icon" aria-hidden="true">🔥</span>
        <span id="streak">0</span>
      </div>
      <button class="tbtn" id="toggle-btn" aria-label="Changer de thème"></button>
    </div>
  </header>

  <div class="prog-row">
    <div class="prog-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Pourcentage de bonnes réponses">
      <div class="prog-bar" id="prog-bar"></div>
    </div>
    <span class="prog-pct" id="prog-pct">0%</span>
  </div>

  <main class="duel" id="duel">
    <button class="side" id="side-A" aria-label="Choisir l'article A">
      <div class="side-img">
        <div class="img-shimmer" id="shimA" aria-hidden="true"></div>
        <img id="imgel-A" src="" alt="" style="display:none">
        <div class="no-img" id="ph-A" style="display:none" aria-hidden="true">📄</div>
      </div>
      <div class="choose-hint" aria-hidden="true">Choisir</div>
      <div class="ribbon" aria-hidden="true">✓ Gagnant</div>
      <div class="side-footer">
        <div class="side-info">
          <div class="side-title" id="title-A">—</div>
        </div>
        <div class="views-block" aria-live="polite">
          <div class="views-num" id="num-A">???</div>
          <div class="views-sub">vues</div>
        </div>
      </div>
    </button>

    <div class="vs-col" aria-hidden="true"><span class="vs-badge">VS</span></div>

    <button class="side" id="side-B" aria-label="Choisir l'article B">
      <div class="side-img">
        <div class="img-shimmer" id="shimB" aria-hidden="true"></div>
        <img id="imgel-B" src="" alt="" style="display:none">
        <div class="no-img" id="ph-B" style="display:none" aria-hidden="true">📄</div>
      </div>
      <div class="choose-hint" aria-hidden="true">Choisir</div>
      <div class="ribbon" aria-hidden="true">✓ Gagnant</div>
      <div class="side-footer">
        <div class="side-info">
          <div class="side-title" id="title-B">—</div>
        </div>
        <div class="views-block" aria-live="polite">
          <div class="views-num" id="num-B">???</div>
          <div class="views-sub">vues</div>
        </div>
      </div>
    </button>
  </main>

  <div class="bottom">
    <div class="feedback loading" id="feedback" role="status" aria-live="polite">Chargement…</div>
    <button class="btn-next" id="btn-next" aria-label="Question suivante">
      Suivant
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

  <footer class="foot">
    Données&nbsp;·&nbsp;<a href="https://fr.wikipedia.org" target="_blank" rel="noopener noreferrer">Wikipédia fr</a>
    <span aria-hidden="true"> · </span>
    <a href="https://wikimedia.org/api/rest_v1/" target="_blank" rel="noopener noreferrer">API Wikimédia</a>
  </footer>

</div>
<script src="script.js"></script>
<script src="theme.js"></script>
</body>
</html>
