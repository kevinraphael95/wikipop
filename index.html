<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WikiGames</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script defer src="script.js"></script>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">Wiki<span>Games</span></div>
    <div class="score-pill">
      <i class="ti ti-trophy" aria-hidden="true"></i>
      <strong id="hdr-score">0</strong>
      <span class="sep">·</span>
      <i class="ti ti-flame streak-fire" aria-hidden="true"></i>
      <strong id="hdr-streak">0</strong>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="sb-score">0</div><div class="stat-lbl">Points</div></div>
    <div class="stat-card"><div class="stat-val" id="sb-streak">0</div><div class="stat-lbl">Série</div></div>
    <div class="stat-card"><div class="stat-val" id="sb-best">0</div><div class="stat-lbl">Meilleure</div></div>
    <div class="stat-card"><div class="stat-val" id="sb-rounds">0</div><div class="stat-lbl">Questions</div></div>
  </div>

  <div class="modes" id="modes"></div>

  <div class="card" id="card" role="main" aria-live="polite"></div>
</div>
</body>
</html>
